<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    >
    <meta name="description" content="Personal mobile map with optional live location and saved favorites.">
    <meta name="theme-color" content="#0d1b20">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'none';
        script-src 'self' blob:;
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob:
            https://tiles.bergfex.at
            https://*.tile.openstreetmap.org
            https://*.tile.opentopomap.org
            https://*.tile-cyclosm.openstreetmap.fr
            https://server.arcgisonline.com
            https://mapsneu.wien.gv.at
            https://tiles.openfreemap.org
            https://tiles.mapterhorn.com;
        connect-src 'self' blob:
            https://tiles.bergfex.at
            https://*.tile.openstreetmap.org
            https://*.tile.opentopomap.org
            https://*.tile-cyclosm.openstreetmap.fr
            https://server.arcgisonline.com
            https://mapsneu.wien.gv.at
            https://tiles.openfreemap.org
            https://tiles.mapterhorn.com;
        worker-src 'self' blob:;
        child-src blob:;
        font-src 'self' data:;
        manifest-src 'self';
        object-src 'none';
        base-uri 'self';
    ">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./images/maphop-logo-72px.png" sizes="72x72" type="image/png">
    <link rel="icon" href="./images/maphop-logo-192px.png" sizes="192x192" type="image/png">
    <link rel="apple-touch-icon" href="./images/maphop-logo-192px.png">
    <title>Maphop Map</title>
    <link rel="stylesheet" href="./css/maphop.css">
</head>
<body>
    <div id="app">
        <div id="map" aria-label="Maphop map"></div>

        <section class="control-menu" id="menuShell">
            <div class="control-menu-header">
                <span class="menu-title" aria-hidden="true">Maphop</span>
                <button
                    class="menu-button"
                    id="layerMenuButton"
                    type="button"
                    aria-expanded="false"
                    aria-controls="layerMenu"
                    aria-label="Open map controls"
                >
                    <span class="menu-button-lines" aria-hidden="true">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </button>
            </div>

            <div class="menu-content menu-divider" id="layerMenu" role="menu">
                <div class="menu-group">
                    <p class="menu-group-title">Location</p>
                    <button class="menu-toggle-row" id="locateButton" type="button" data-state="idle">
                        <span class="menu-toggle-copy">
                            <strong>Show My Location</strong>
                            <span id="locationToggleLabel">Off</span>
                        </span>
                        <span class="menu-toggle-pill" aria-hidden="true"></span>
                    </button>
                    <p class="menu-note">
                        Remote map providers can infer your nearby area from the tiles your device requests.
                    </p>
                </div>

                <div class="menu-scroll-region">
                    <div class="menu-group menu-group-favorites">
                        <button
                            class="menu-section-toggle"
                            id="favoritesSectionToggle"
                            type="button"
                            aria-expanded="true"
                            aria-controls="favoritesSectionPanel"
                        >
                            <span class="menu-group-title">Favorites</span>
                            <span class="menu-section-toggle-icon" aria-hidden="true"></span>
                        </button>
                        <div class="menu-section-panel" id="favoritesSectionPanel">
                            <button class="menu-action-button" id="saveFavoriteButton" type="button">
                                Save Current View
                            </button>
                            <div class="favorites-list" id="favoritesList"></div>
                            <p class="favorites-empty" id="favoritesEmpty">No saved locations yet.</p>
                        </div>
                    </div>

                    <div class="menu-group">
                        <button
                            class="menu-section-toggle"
                            id="mapsSectionToggle"
                            type="button"
                            aria-expanded="true"
                            aria-controls="mapsSectionPanel"
                        >
                            <span class="menu-group-title">Maps</span>
                            <span class="menu-section-toggle-icon" aria-hidden="true"></span>
                        </button>
                        <div class="menu-section-panel" id="mapsSectionPanel">
                            <div class="map-options" role="group" aria-label="Base maps">
                                <button class="layer-option" type="button" role="menuitemradio" data-layer-key="bergfex">
                                    Bergfex OSM
                                </button>
                                <button class="layer-option" type="button" role="menuitemradio" data-layer-key="osm">
                                    OpenStreetMap
                                </button>
                                <button class="layer-option" type="button" role="menuitemradio" data-layer-key="openfreemap">
                                    OpenFreeMap Liberty
                                </button>
                                <button class="layer-option" type="button" role="menuitemradio" data-layer-key="opentopo">
                                    OpenTopoMap
                                </button>
                                <button class="layer-option" type="button" role="menuitemradio" data-layer-key="cyclosm">
                                    CyclOSM
                                </button>
                                <button class="layer-option" type="button" role="menuitemradio" data-layer-key="esriSatellite">
                                    Esri Satellite
                                </button>
                                <button class="layer-option" type="button" role="menuitemradio" data-layer-key="basemapGrauWmts">
                                    basemap.at Grau WMTS
                                </button>
                            </div>
                            <button class="menu-toggle-row terrain-toggle-row" id="terrainButton" type="button" data-state="idle">
                                <span class="menu-toggle-copy">
                                    <strong>3D Terrain</strong>
                                    <span id="terrainToggleLabel">Off</span>
                                </span>
                                <span class="menu-toggle-pill" aria-hidden="true"></span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="menu-footer">
                    <a class="menu-footer-button" href="./settings.html">Settings</a>
                    <a class="menu-footer-link" href="./impressum.html">Impressum &amp; Datenschutz</a>
                    <a class="menu-footer-link" href="https://github.com/mdiener21/maphop" target="_blank" rel="noopener">Source Code Github</a>
                    <span class="menu-footer-version" id="appVersion"></span>
                </div>
            </div>
        </section>

        <p class="status-toast" id="status" aria-live="polite"></p>

        <div class="attribution-widget" id="attributionWidget">
            <div class="attribution-panel" id="attributionPanel" hidden>
                <p class="attribution-text" id="attributionText"></p>
            </div>
            <button class="attribution-button" id="attributionButton" type="button" aria-label="Map attribution" aria-expanded="false" aria-controls="attributionPanel">
                &copy;
            </button>
        </div>

        <button class="compass-button" id="compassButton" type="button" aria-label="Reset map to north" hidden>
            <svg id="compassNeedle" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
                <polygon points="12,3 14.5,12 12,10.5 9.5,12" fill="currentColor"/>
                <polygon points="12,21 9.5,12 12,13.5 14.5,12" fill="currentColor" opacity="0.28"/>
            </svg>
        </button>

        <button class="recenter-button" id="reCenterButton" type="button" aria-label="Re-center on my location" hidden>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="3"></circle>
                <line x1="12" y1="2" x2="12" y2="6"></line>
                <line x1="12" y1="18" x2="12" y2="22"></line>
                <line x1="2" y1="12" x2="6" y2="12"></line>
                <line x1="18" y1="12" x2="22" y2="12"></line>
            </svg>
            Re-center
        </button>

        <div class="install-banner" id="installBanner" hidden role="status" aria-live="polite">
            <span class="install-banner-text">Install Maphop to your home screen for offline access</span>
            <button class="install-banner-btn" id="installButton" type="button">Install</button>
            <button class="install-banner-close" id="installDismiss" type="button" aria-label="Dismiss install prompt">&#x2715;</button>
        </div>

        <div class="install-banner install-banner-ios" id="iosBanner" hidden role="status" aria-live="polite">
            <span class="install-banner-text">Tap <strong>Share</strong> then <strong>Add to Home Screen</strong> to install Maphop</span>
            <button class="install-banner-close" id="iosDismiss" type="button" aria-label="Dismiss install hint">&#x2715;</button>
        </div>
    </div>

    <script type="module" src="./js/maphop.js"></script>
</body>
</html>
